[metadata]
name = "agent-sessions"
description = "Browse and resume Claude, Codex, OpenCode, and Pi sessions"
requirements = ["agent-sessions", "bun"]

[source]
command = "agent-sessions list"
display = "{split:\t:0}"
output = "{split:\t:0}"
frecency = false
no_sort = true

[preview]
command = "agent-sessions preview '{split:\t:1}'"
header = "{split:\t:0}"

[keybindings]
enter = "actions:resume"

[actions.resume]
description = "Resume selected agent session"
command = "agent-sessions resume '{split:\t:1}' --apply"
mode = "execute"
