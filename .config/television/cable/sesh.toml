[metadata]
name = "sesh"
description = "Session manager integrating tmux sessions, zoxide directories, and config paths"
requirements = ["sesh", "fd", "wt", "jq", "agent-sessions"]

[source]
ansi = true
frecency = false
no_sort = true
output = "{strip_ansi|split: :1..|join: }"

[[source.command]]
name = "All"
run = "sesh list --icons"

[[source.command]]
name = "Tmux"
run = "sesh list -t --icons"

[[source.command]]
name = "Worktrunk"
run = "wt list --format=json | jq -r '.[].path'"

[[source.command]]
name = "Agent Sessions"
run = "printf 'Agent Sessions 🤖\\n'"

[[source.command]]
name = "Configs"
run = "sesh list -c --icons"

[[source.command]]
name = "Zoxide"
run = "sesh list -z --icons"

[[source.command]]
name = "Directories"
run = "fd -H -d 2 -t d -E .Trash . ~"

[preview]
command = "sh -c 'if [ \"$1\" = \"Agent Sessions 🤖\" ]; then printf \"Open the agent sessions picker\\n\"; else sesh preview \"$1\"; fi' _ '{strip_ansi|split: :1..|join: }'"

[keybindings]
enter = "actions:connect"
ctrl-d = ["actions:kill_session", "reload_source"]

[actions.connect]
description = "Connect to selected session"
command = "sh -c 'if [ \"$1\" = \"Agent Sessions 🤖\" ]; then exec tv agent-sessions; else exec sesh connect \"$1\"; fi' _ '{strip_ansi|split: :1..|join: }'"
mode = "execute"

[actions.kill_session]
description = "Kill selected tmux session (press Ctrl+r to reload)"
command = "tmux kill-session -t '{strip_ansi|split: :1..|join: }'"
mode = "fork"
