# =============================================================================
# General
# =============================================================================

# Use 256-color and true-color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 100000

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Reduce escape delay (important for vim/neovim)
set -sg escape-time 0

# Enable focus events (for vim autoread etc.)
set -g focus-events on

# Propagate pane title to terminal title bar
set -g set-titles on
set -g set-titles-string "#{pane_title}"

# Enable extended key sequences
set -s extended-keys on

# Display tmux messages for 3 seconds
set -g display-time 3000

# Refresh status bar every 5 seconds
set -g status-interval 5

# Prevent automatic window renaming
set -g allow-rename off

# Quiet mode: disable visual and audible alerts
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# =============================================================================
# Prefix
# =============================================================================

# Change prefix to Ctrl+a (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r p previous-window
bind -r n next-window

# Swap windows left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# =============================================================================
# Mouse
# =============================================================================

set -g mouse on

# Scroll 1 line at a time for precise scrolling
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# =============================================================================
# Copy Mode (vi)
# =============================================================================

setw -g mode-keys vi
setw -g mode-style "fg=black,bg=cyan,bold"

bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# macOS clipboard integration
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}

# =============================================================================
# Status Bar
# =============================================================================

# Nerd Font pill characters
PILL_OPEN="#(printf '\uE0B6')"
PILL_CLOSE="#(printf '\uE0B4')"
ARROW_LEFT="#(printf '\uE0B2')"
ARROW_RIGHT="#(printf '\uE0B0')"

set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-justify centre

# Left: session name in pill
set -g status-left-length 100
set -g status-left "\
#[fg=brightblack,bg=default]${PILL_OPEN}\
#[bg=brightblack,fg=blue] #S \
#[fg=brightblack,bg=default]${ARROW_RIGHT}\
"

# Right: time and hostname in pill
set -g status-right-length 100
set -g status-right "\
#[fg=brightblack,bg=default]${ARROW_LEFT}\
#[bg=brightblack,fg=cyan] %H:%M #h \
#[fg=brightblack,bg=default]${PILL_CLOSE}\
"

# Inactive window tabs
set -g window-status-format "\
 #I\
#[fg=cyan]:\
#[fg=default]#W \
"

# Active window tab in pill
set -g window-status-current-format "\
#[fg=brightblack,bg=default]${PILL_OPEN}\
#[bg=brightblack,fg=default] #I\
#[fg=cyan]:\
#[fg=default]#W \
#[fg=brightblack,bg=default]${PILL_CLOSE}\
"

set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# Clock mode
setw -g clock-mode-colour cyan

# Window bell style
setw -g window-status-bell-style "fg=yellow,bg=red,bold"

# Message style
set -g message-style "bg=default,fg=yellow"

# =============================================================================
# Local Overrides
# =============================================================================

# Source local config if it exists (for machine-specific settings)
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
