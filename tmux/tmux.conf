# =============================================================================
# General
# =============================================================================

# Use 256-color and true-color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Reduce escape delay (important for vim/neovim)
set -sg escape-time 0

# Enable focus events (for vim autoread etc.)
set -g focus-events on

# Display tmux messages for 3 seconds
set -g display-time 3000

# Refresh status bar every 5 seconds
set -g status-interval 5

# =============================================================================
# Prefix
# =============================================================================

# Change prefix to Ctrl+a (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r p previous-window
bind -r n next-window

# Swap windows left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# =============================================================================
# Mouse
# =============================================================================

set -g mouse on

# =============================================================================
# Copy Mode (vi)
# =============================================================================

setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# macOS clipboard integration
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}

# =============================================================================
# Status Bar
# =============================================================================

set -g status-position top
set -g status-style "bg=default,fg=white"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=blue,bold] #S #[default]"

# Right: date and time
set -g status-right-length 50
set -g status-right "#[fg=white,dim]%a %b %d  %H:%M "

# Window tabs
set -g window-status-format " #[fg=brightblack]#I:#W "
set -g window-status-current-format " #[fg=cyan,bold]#I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# Message style
set -g message-style "bg=default,fg=yellow"

# =============================================================================
# Local Overrides
# =============================================================================

# Source local config if it exists (for machine-specific settings)
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
